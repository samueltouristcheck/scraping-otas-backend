services:
  postgres:
    image: postgres:16-alpine
    container_name: ota_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: ota_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      VIATOR_LISTING_FILE: /app/data/viator_tours.json
    volumes:
      - ./data:/app/data
    ports:
      - "${API_PORT}:8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    container_name: ota_scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      SCHEDULER_TZ: ${SCHEDULER_TZ}
    command: python -m scheduler.runner

volumes:
  postgres_data:
